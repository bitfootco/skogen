name: CI

on:
  push:
    branches: [main, 'rc/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - name: Verify dist
        run: |
          test -f dist/index.cjs
          test -f dist/index.mjs
          test -f dist/index.d.cts
          test -f dist/index.d.mts
