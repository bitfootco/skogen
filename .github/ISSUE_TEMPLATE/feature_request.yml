name: Feature Request
description: Suggest a new component or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve or what use case does it enable?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like to see this implemented?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you thought about?
